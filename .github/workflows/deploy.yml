name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /srv/repos/wojtek-gorecki-de
            git fetch origin main
            git reset --hard origin/main
            cd /srv
            docker compose build wojtek-gorecki-de
            docker compose up -d wojtek-gorecki-de
